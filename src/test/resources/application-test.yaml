spring:
  h2:
    console:
      enabled: false
  datasource:
    url: jdbc:h2:mem:filmhubtestdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

filmhub:
  base-url: http://localhost:8089