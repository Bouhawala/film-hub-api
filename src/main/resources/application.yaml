management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, metrics, circuitbreakers, ratelimiters
  endpoint:
    health:
      show-details: always

spring:
  web:
    locale: en
    locale-resolver: fixed
  datasource:
    url: jdbc:h2:mem:filmhubdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 10000

info:
  app:
    name: FilmHub
    version: @project.version@

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}

filmhub:
  base-url: https://api.film-hub.neofacto.dev

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    root: INFO
    com.neofacto.filmhubapi: DEBUG

resilience4j:
  ratelimiter:
    instances:
      films:
        limit-for-period: 50
        limit-refresh-period: 1m
        timeout-duration: 0s