management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, circuitbreakers, ratelimiters
  endpoint:
    health:
      show-details: always

spring:
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate

info:
  app:
    name: FilmHub
    version: @project.version@

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 24 hours in milliseconds

filmhub:
  base-url: https://api.film-hub.neofacto.dev

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    root: INFO
    com.neofacto.filmhubapi: DEBUG

resilience4j:
  ratelimiter:
    instances:
      films:
        limit-for-period: 50
        limit-refresh-period: 1m
        timeout-duration: 0s